<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prim Hesaplayıcı</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#080810; --surface:#10101c; --surface2:#18182a; --border:#252538;
  --accent:#e8b84b; --accent2:#ff6b35; --text:#eeeef8; --muted:#6060a0;
  --green:#3dd68c; --blue:#60a5fa; --purple:#a78bfa; --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none;}

/* SPLASH */
#splashScreen{position:fixed;inset:0;background:#050508;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;transition:opacity 0.8s ease,transform 0.8s ease;}
#splashScreen.fade-out{opacity:0;transform:scale(1.04);pointer-events:none;}
.splash-bismillah{font-family:'Amiri',serif;font-size:26px;color:var(--accent);margin-bottom:20px;opacity:0;animation:fadeUp 0.8s 0.3s ease forwards;}
.splash-ornament{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 24px;opacity:0;animation:fadeUp 0.8s 0.5s ease forwards;}
.splash-arabic{font-family:'Amiri',serif;font-size:24px;line-height:2;color:#d4a832;direction:rtl;margin-bottom:18px;opacity:0;animation:fadeUp 0.8s 0.7s ease forwards;}
.splash-turkish{font-size:14px;font-style:italic;color:rgba(200,195,230,0.75);line-height:1.7;max-width:300px;margin-bottom:8px;opacity:0;animation:fadeUp 0.8s 1.1s ease forwards;}
.splash-ref{font-size:11px;letter-spacing:2px;color:var(--muted);margin-bottom:44px;opacity:0;animation:fadeUp 0.8s 1.4s ease forwards;}
.splash-btn{background:linear-gradient(135deg,#c9922a,#e8b84b);border:none;border-radius:50px;padding:14px 40px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#0a0808;cursor:pointer;opacity:0;animation:fadeUp 0.8s 1.8s ease forwards;box-shadow:0 8px 30px rgba(232,184,75,0.25);transition:transform 0.15s;}
.splash-btn:active{transform:scale(0.97);}
.splash-progress{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));animation:progressBar 4.5s linear forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes progressBar{from{width:0;}to{width:100%;}}

/* MAIN APP */
#mainApp{opacity:0;transition:opacity 0.6s ease;display:flex;flex-direction:column;height:100vh;visibility:hidden;}
#mainApp.visible{opacity:1;visibility:visible;}
.header{background:linear-gradient(160deg,#0c0c1e 0%,#140f1e 100%);padding:22px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent);line-height:1;}
.header-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* NAV BAR */
.nav-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;background:transparent;border:none;padding:12px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);}
.nav-btn.active .nav-icon,.nav-btn.active .nav-lbl{color:var(--accent);}
.nav-icon{font-size:18px;}
.nav-lbl{font-size:9px;letter-spacing:0.5px;font-weight:600;text-transform:uppercase;}

.page{flex:1;overflow-y:auto;padding-bottom:24px;display:none;}
.page.active{display:block;}

/* TARGET CARDS */
.target-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all 0.3s;}
.target-row.active{border-color:var(--accent);background:rgba(232,184,75,0.05);box-shadow: 0 0 15px rgba(232,184,75,0.1);}
.target-row.reached{border-color:var(--green);background:rgba(61,214,140,0.02);}
.t-num{width:36px;height:36px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);flex-shrink:0;}
.target-row.active .t-num{background:rgba(232,184,75,0.2);color:var(--accent);}
.target-row.reached .t-num{background:rgba(61,214,140,0.15);color:var(--green);}
.t-content{flex:1;min-width:0;}
.t-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.t-meta{font-size:9px;color:var(--muted);letter-spacing:0.2px;line-height:1.4;}
.t-right{text-align:right;flex-shrink:0;}
.t-prim-val{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--green);}
.target-row.active .t-prim-val{color:var(--accent);font-size:16px;}
.t-prim-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* INPUT CARD */
.section{padding:14px 16px 0;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;}
.inp-group{margin-bottom:13px;}
.inp-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
input[type="tel"],input[type="text"],input[type="date"]{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text);outline:none;padding:12px;}
.inp-wrap{position:relative;}
.inp-pfx{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-weight:700;color:var(--accent);}
.inp-tutar{padding-left:30px !important;}
.ekle-btn{width:100%;background:linear-gradient(135deg,#c9922a,#e8b84b);border:none;border-radius:13px;padding:15px;font-size:13px;font-weight:700;text-transform:uppercase;color:#0a0808;cursor:pointer;margin-top:14px;}

/* ANALİZ KUTUCUKLARI */
.breakdown{display:grid;grid-template-columns:repeat(4, 1fr);gap:6px;padding:0 16px;margin-top:14px;}
.bd-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 4px;text-align:center;}
.bd-lbl{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.bd-val{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--blue);line-height:1.2;}
.bd-prim{font-size:12px;color:var(--muted);margin-top:4px;font-weight:600;}

/* ÖZET KARTI - 3 BÖLMELİ */
.ozet-card{margin:14px 16px 0;background:linear-gradient(135deg,#100a1a,#160f20);border:2px solid rgba(167,139,250,0.3);border-radius:18px;padding:18px;}
.ozet-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;text-align:center;}
.ozet-box{display:flex;flex-direction:column;gap:4px;}
.ozet-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.ozet-prim{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--purple);line-height:1;}

.progress-card{margin:14px 16px 0;background:var(--surface);border:1.5px solid rgba(232,184,75,0.2);border-radius:18px;padding:18px;}
.pg-bar-bg{height:6px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden;margin:8px 0;}
.pg-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 0.7s;}

/* GEÇMİŞ SATIRLARI */
.satis-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;}
.satis-row-main{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.satis-info{flex:1;min-width:0;display:flex;flex-direction:column;}
.satis-musteri{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.satis-tarih{font-size:10px;color:var(--muted);}
.satis-tutar{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);white-space:nowrap;}
.satis-actions{display:flex;gap:4px;}
.act-btn{padding:6px 10px;font-size:11px;font-weight:700;border-radius:8px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;cursor:pointer;}
.act-btn.edit{color:var(--accent);border-color:rgba(232,184,75,0.3);}
.act-btn.del{color:var(--red);border-color:rgba(248,113,113,0.3);}

/* EXCEL BUTON */
.excel-btn{width:100%; background:linear-gradient(135deg,#1d6f42,#2a8c55); border:none; border-radius:12px; padding:12px; color:white; font-size:12px; font-weight:700; text-transform:uppercase; margin-bottom:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--border);border-radius:12px;padding:10px 20px;font-size:13px;color:var(--text);z-index:2000;opacity:0;transition:all 0.3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="splashScreen">
  <div class="splash-bismillah">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ</div>
  <div class="splash-ornament"></div>
  <div class="splash-arabic" id="ayetArabic"></div>
  <div class="splash-turkish" id="ayetTurkish"></div>
  <div class="splash-ref" id="ayetRef"></div>
  <button class="splash-btn" onclick="enterApp()">GİRİŞ YAP</button>
  <div class="splash-progress"></div>
</div>

<div id="mainApp">
  <div class="header">
    <div class="header-title">PRİM HESAP</div>
    <div class="header-sub">Orijinal Koyu Tema · Detaylı Analiz</div>
  </div>

  <div class="page active" id="page-ana">
    <div class="section">
      <div class="card">
        <div class="inp-group"><div class="inp-lbl">Müşteri Adı</div><input type="text" id="musteriAdi" placeholder="Müşteri..." autocomplete="off"></div>
        <div class="inp-group">
          <div class="inp-lbl">Satış Tutarı (₺)</div>
          <div class="inp-wrap"><span class="inp-pfx">₺</span><input type="tel" class="inp-tutar" id="satisTutar" placeholder="0,00" oninput="formatTutar(this)"></div>
        </div>
        <div class="inp-group"><div class="inp-lbl">Tarih</div><input type="date" id="satisTarih"></div>
        <button class="ekle-btn" onclick="kayitEkle()">✚ Kaydet</button>
      </div>
    </div>
    
    <div class="breakdown">
      <div class="bd-card"><div class="bd-lbl">1. ÇEYREK</div><div class="bd-val" id="bd-q1">0 ₺</div><div class="bd-prim" id="bd-q1-p">P: 0,00 ₺</div></div>
      <div class="bd-card"><div class="bd-lbl">2. ÇEYREK</div><div class="bd-val" id="bd-q2">0 ₺</div><div class="bd-prim" id="bd-q2-p">P: 0,00 ₺</div></div>
      <div class="bd-card"><div class="bd-lbl">3. ÇEYREK</div><div class="bd-val" id="bd-q3">0 ₺</div><div class="bd-prim" id="bd-q3-p">P: 0,00 ₺</div></div>
      <div class="bd-card"><div class="bd-lbl">4. ÇEYREK</div><div class="bd-val" id="bd-q4">0 ₺</div><div class="bd-prim" id="bd-q4-p">P: 0,00 ₺</div></div>
    </div>

    <div class="ozet-card" id="ozetCard"></div>
    <div class="progress-card" id="progressCard"></div>

    <div class="section">
      <div class="header-sub" style="margin-bottom:10px; text-transform:uppercase; letter-spacing:1px;">Hedefler ve Periyot Eşikleri</div>
      <div id="targetList"></div>
    </div>
  </div>

  <div class="page" id="page-gecmis">
    <div class="section">
        <button class="excel-btn" onclick="exportToExcel()">📊 Excel Raporu İndir</button>
        <div id="gecmisList"></div>
    </div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn active" onclick="setPage('ana')" id="nav-ana">🏠<span class="nav-lbl">Ana</span></button>
    <button class="nav-btn" onclick="setPage('gecmis')" id="nav-gecmis">📋<span class="nav-lbl">Geçmiş</span></button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AYETLER=[
  {arabic:"إِنَّ مَعَ الْعُسْرِ يُسْرًا",turkish:"Şüphesiz güçlükle birlikte kolaylık vardır.",ref:"İnşirah Suresi · 94:6"},
  {arabic:"وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ",turkish:"İnsan için ancak çalıştığının karşılığı vardır.",ref:"Necm Suresi · 53:39"}
];
const TARGETS=[
  {no:1,oran:0.0035, aylik:2083333,  ucaylik:6250000,  yillik:25000000},
  {no:2,oran:0.0060, aylik:4375000,  ucaylik:13125000, yillik:52500000},
  {no:3,oran:0.0080, aylik:6125000,  ucaylik:18375000, yillik:73500000},
  {no:4,oran:0.0100, aylik:8575000,  ucaylik:25725000, yillik:102900000},
  {no:5,oran:0.0120, aylik:12005000, ucaylik:36015000, yillik:144060000},
  {no:6,oran:0.0140, aylik:16807000, ucaylik:50421000, yillik:201684000}
];

let satislar=[], currentDonem='aylik';

function save(){localStorage.setItem('prim_v3_orig',JSON.stringify(satislar));}
function load(){const r=localStorage.getItem('prim_v3_orig'); if(r)satislar=JSON.parse(r);}

function enterApp(){
  document.getElementById('splashScreen').classList.add('fade-out');
  document.getElementById('mainApp').style.display='flex';
  setTimeout(()=>{document.getElementById('mainApp').classList.add('visible');document.getElementById('splashScreen').style.display='none';},800);
  load();setToday('satisTarih');renderAll();
}

(function init(){
  const a=AYETLER[Math.floor(Math.random()*AYETLER.length)];
  document.getElementById('ayetArabic').textContent=a.arabic;
  document.getElementById('ayetTurkish').textContent=a.turkish;
  document.getElementById('ayetRef').textContent=a.ref;
  setTimeout(enterApp,3500);
})();

function fmtTL(n){return (n||0).toLocaleString('tr-TR',{minimumFractionDigits:2, maximumFractionDigits:2})+' ₺';}
function fmtCompact(n){return (n||0).toLocaleString('tr-TR',{maximumFractionDigits:0})+' ₺';}

function formatTutar(inp){
  let val=inp.value.replace(/[^0-9,]/g,''),pts=val.split(','),tam=pts[0].replace(/\D/g,'');
  if(tam)tam=parseInt(tam).toLocaleString('tr-TR');
  inp.value=tam+(pts[1]!==undefined?','+pts[1].substring(0,2):'');
}

function getRaw(id){return parseFloat(document.getElementById(id).value.replace(/\./g,'').replace(',','.'))||0;}
function setToday(id){document.getElementById(id).value=new Date().toISOString().split('T')[0];}

function setPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='gecmis') renderGecmis();
}

function findBarem(t,d){
  const k=d==='aylik'?'aylik':d==='ucaylik'?'ucaylik':'yillik';
  for(let i=TARGETS.length-1;i>=0;i--)if(t>=TARGETS[i][k])return TARGETS[i];
  return null;
}

function getQuarterSales(q){
  const y=new Date().getFullYear();
  return satislar.filter(s=>{
    const [sy,sm]=s.tarih.split('-');
    return parseInt(sy)===y && Math.ceil(parseInt(sm)/3)===q;
  }).reduce((sum,s)=>sum+s.tutar,0);
}

function renderAna(){
  const y=new Date().getFullYear(), m=new Date().getMonth()+1;
  
  // Aylık Hesap
  const filteredAylik = satislar.filter(s=>s.tarih.startsWith(`${y}-${String(m).padStart(2,'0')}`));
  const totAylik = filteredAylik.reduce((s,x)=>s+x.tutar,0);
  const brAylik = findBarem(totAylik, 'aylik');
  const primAylik = brAylik ? totAylik * brAylik.oran : 0;

  // 3 Aylık Hesap
  const qNum = Math.ceil(m/3);
  const filteredUcaylik = satislar.filter(s=>{
    const [sy,sm]=s.tarih.split('-');
    return parseInt(sy)===y && Math.ceil(parseInt(sm)/3)===qNum;
  });
  const totUcaylik = filteredUcaylik.reduce((s,x)=>s+x.tutar,0);
  const brUcaylik = findBarem(totUcaylik, 'ucaylik');
  const primUcaylik = brUcaylik ? totUcaylik * brUcaylik.oran : 0;

  // Yıllık Hesap
  const filteredYillik = satislar.filter(s=>s.tarih.startsWith(String(y)));
  const totYillik = filteredYillik.reduce((s,x)=>s+x.tutar,0);
  const brYillik = findBarem(totYillik, 'yillik');
  const primYillik = brYillik ? totYillik * brYillik.oran : 0;

  // Çeyrek Kutuları
  for(let i=1;i<=4;i++){
    const qt=getQuarterSales(i), qb=findBarem(qt,'ucaylik');
    document.getElementById(`bd-q${i}`).textContent=fmtTL(qt);
    document.getElementById(`bd-q${i}-p`).textContent=`P: ${fmtTL(qb?qt*qb.oran:0)}`;
  }

  // Özet Kartı (3'lü Bölüm)
  const oC=document.getElementById('ozetCard');
  oC.innerHTML = `
    <div class="ozet-grid">
      <div class="ozet-box">
        <div class="ozet-lbl">AYLIK PRİM</div>
        <div class="ozet-prim">${fmtTL(primAylik)}</div>
      </div>
      <div class="ozet-box">
        <div class="ozet-lbl">3 AYLIK PRİM</div>
        <div class="ozet-prim">${fmtTL(primUcaylik)}</div>
      </div>
      <div class="ozet-box">
        <div class="ozet-lbl">YILLIK PRİM</div>
        <div class="ozet-prim">${fmtTL(primYillik)}</div>
      </div>
    </div>
  `;

  // Progress Bar (Aylık hedefe göre görsel feedback)
  const pC=document.getElementById('progressCard'), next=brAylik?TARGETS[TARGETS.indexOf(brAylik)+1]:TARGETS[0];
  const goal=next?next.aylik:totAylik, pct=Math.min(100,Math.round((totAylik/goal)*100));
  pC.innerHTML=`<div style="display:flex;justify-content:space-between"><span class="bd-lbl">Aylık Hedef İlerlemesi</span><span class="bd-lbl">%${pct}</span></div><div class="pg-bar-bg"><div class="pg-bar-fill" style="width:${pct}%"></div></div>`;

  // Hedef Listesi
  const sK=currentDonem==='aylik'?'aylik':currentDonem==='ucaylik'?'ucaylik':'yillik';
  const currentTotal = (currentDonem === 'aylik') ? totAylik : (currentDonem === 'ucaylik') ? totUcaylik : totYillik;
  const currentBarem = findBarem(currentTotal, currentDonem);

  document.getElementById('targetList').innerHTML=TARGETS.map(t=>{
    const isReached = currentTotal >= t[sK];
    const isActive = currentBarem && currentBarem.no === t.no;
    const calcPrim = currentTotal * t.oran;

    return `
    <div class="target-row ${isActive?'active':''} ${isReached && !isActive?'reached':''}">
      <div class="t-num">${t.no}</div>
      <div class="t-content">
        <div class="t-name">Hedef ${t.no} - %${(t.oran*100).toFixed(2)}</div>
        <div class="t-meta">
          Aylık: ${fmtCompact(t.aylik)}<br>
          3 Aylık: ${fmtCompact(t.ucaylik)}<br>
          Yıllık: ${fmtCompact(t.yillik)}
        </div>
      </div>
      <div class="t-right">
        <div class="t-prim-val">${fmtTL(calcPrim)}</div>
        <div class="t-prim-lbl">${isActive?'Hakediş':'Örnek'}</div>
      </div>
    </div>`;
  }).join('');
}

function kayitEkle(){
  const m=document.getElementById('musteriAdi').value||'İsimsiz',t=getRaw('satisTutar'),d=document.getElementById('satisTarih').value;
  if(!t||!d){showToast('Eksik bilgi!');return;}
  satislar.push({id:Date.now(),musteri:m,tutar:t,tarih:d});
  save();renderAll();showToast('Kaydedildi');
  document.getElementById('satisTutar').value='';document.getElementById('musteriAdi').value='';
}

function renderGecmis(){
  const list = document.getElementById('gecmisList');
  if(!satislar.length){list.innerHTML='<div class="bd-lbl" style="text-align:center">Henüz kayıt yok.</div>';return;}
  list.innerHTML=satislar.slice().reverse().map(s=>`
    <div class="satis-row">
      <div class="satis-row-main">
        <div class="satis-info"><span class="satis-musteri">${s.musteri}</span><span class="satis-tarih">${s.tarih}</span></div>
        <span class="satis-tutar">${fmtTL(s.tutar)}</span>
        <div class="satis-actions">
            <button class="act-btn edit" onclick="editKayit(${s.id})">REVİZE</button>
            <button class="act-btn del" onclick="silKayit(${s.id})">KALDIR</button>
        </div>
      </div>
    </div>`).join('');
}

function editKayit(id){
  const s = satislar.find(x=>x.id===id);
  if(!s) return;
  document.getElementById('musteriAdi').value = s.musteri;
  document.getElementById('satisTutar').value = s.tutar.toLocaleString('tr-TR');
  document.getElementById('satisTarih').value = s.tarih;
  satislar = satislar.filter(x=>x.id!==id);
  setPage('ana');
}

function silKayit(id){
  if(!confirm('Silinsin mi?')) return;
  satislar = satislar.filter(x=>x.id!==id);
  save();renderAll();renderGecmis();
}

// EXCEL EXPORT FONKSİYONU
function exportToExcel() {
    if (satislar.length === 0) { showToast("Kayıt bulunamadı!"); return; }

    const wb = XLSX.utils.book_new();
    const y = new Date().getFullYear();

    // 1. Sekme: Tüm Satışlar
    let tumSatisData = satislar.map(s => ({ "Satış Tarihi": s.tarih, "Müşteri": s.musteri, "Satış Tutarı": s.tutar }));
    let tumToplam = tumSatisData.reduce((a, b) => a + b["Satış Tutarı"], 0);
    tumSatisData.push({ "Satış Tarihi": "GENEL TOPLAM", "Müşteri": "-", "Satış Tutarı": tumToplam });
    const wsTum = XLSX.utils.json_to_sheet(tumSatisData);
    XLSX.utils.book_append_sheet(wb, wsTum, "Tüm Satışlar");

    // Çeyrekleri Dön
    for (let q = 1; q <= 4; q++) {
        const qSatislar = satislar.filter(s => {
            const [sy, sm] = s.tarih.split('-');
            return parseInt(sy) === y && Math.ceil(parseInt(sm) / 3) === q;
        });

        const qToplamTutar = qSatislar.reduce((a, b) => a + b.tutar, 0);
        const barem = findBarem(qToplamTutar, 'ucaylik');
        const oran = barem ? (barem.oran * 100).toFixed(2) + "%" : "0%";
        
        let qData = qSatislar.map(s => {
            const sHakedis = barem ? s.tutar * barem.oran : 0;
            return {
                "Satış Tarihi": s.tarih,
                "Müşteri": s.musteri,
                "Satış Tutarı": s.tutar,
                "Barem Oranı": oran,
                "Hakedilen Prim": sHakedis
            };
        });

        const qToplamHakedis = barem ? qToplamTutar * barem.oran : 0;
        qData.push({
            "Satış Tarihi": q + ". DÖNEM TOPLAMI",
            "Müşteri": "-",
            "Satış Tutarı": qToplamTutar,
            "Barem Oranı": oran,
            "Hakedilen Prim": qToplamHakedis
        });

        const wsQ = XLSX.utils.json_to_sheet(qData);
        XLSX.utils.book_append_sheet(wb, wsQ, q + ". Dönem");
    }

    XLSX.writeFile(wb, `Prim_Raporu_${y}.xlsx`);
    showToast("Excel dosyası indirildi.");
}

function renderAll(){renderAna();}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
</script>
